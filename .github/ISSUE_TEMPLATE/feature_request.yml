name: Feature request
description: Suggest a new readout, setting, or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the idea! Please check open issues first to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to see or do that the plugin doesn't support today?
      placeholder: "I'd like a key that shows ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work? (e.g. a new readout, a new mode, a layout change)
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, screenshots, or links that help explain the request.
    validations:
      required: false
